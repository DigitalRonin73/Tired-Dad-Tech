<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mobile POC Dashboard</title>
  <style>
    :root {
      --bg: #0a0f1f;
      --panel: #121a2f;
      --text: #e9eefc;
      --muted: #9fb0d8;
      --accent: #48d1cc;
      --warn: #ffb347;
      --ok: #8be28b;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif; }
    body { margin: 0; background: linear-gradient(180deg, #121b34, var(--bg)); color: var(--text); }
    .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
    .title { font-size: 1.35rem; font-weight: 700; margin: 6px 0 2px; }
    .sub { color: var(--muted); margin-bottom: 14px; }
    .grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0,1fr)); }
    @media (max-width:560px){ .grid { grid-template-columns: 1fr; } }
    .card {
      background: color-mix(in srgb, var(--panel) 92%, black 8%);
      border: 1px solid #233153;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    .label { color: var(--muted); font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
    .row { display:flex; gap:10px; margin-top: 14px; flex-wrap: wrap; }
    button {
      border: 0; border-radius: 10px; padding: 12px 14px; font-weight: 600;
      background: #273963; color: #fff; cursor:pointer;
    }
    button.primary { background: var(--accent); color: #0b1a20; }
    button.warn { background: var(--warn); color: #2d1c00; }
    .footer { margin-top: 14px; color: var(--muted); font-size: .88rem; }
    .dot { width:10px; height:10px; border-radius:99px; display:inline-block; margin-right:6px; background: var(--ok); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">BC250 Mobile POC</div>
    <div class="sub">Proof-of-concept dashboard on your local network</div>

    <div class="grid">
      <div class="card"><div class="label">CPU Temp</div><div class="value" id="cpuTemp">68°C</div></div>
      <div class="card"><div class="label">Board Power</div><div class="value" id="power">142 W</div></div>
      <div class="card"><div class="label">LLM Status</div><div class="value" id="llm"><span class="dot"></span>Running</div></div>
      <div class="card"><div class="label">Uptime</div><div class="value" id="uptime">00:12:33</div></div>
    </div>

    <div class="row">
      <button class="primary" onclick="pingPOC()">Run POC Action</button>
      <button onclick="randomize()">Refresh Metrics</button>
      <button class="warn" onclick="alert('Demo only: no backend connected yet.')">Emergency Stop</button>
    </div>

    <div class="footer" id="log">Ready. Opened from local network.</div>
  </div>

  <script>
    const log = document.getElementById('log');
    const cpuTemp = document.getElementById('cpuTemp');
    const power = document.getElementById('power');
    const uptime = document.getElementById('uptime');

    function randomize() {
      const t = Math.floor(58 + Math.random()*22);
      const p = Math.floor(95 + Math.random()*85);
      cpuTemp.textContent = `${t}°C`;
      power.textContent = `${p} W`;
      log.textContent = `Metrics refreshed at ${new Date().toLocaleTimeString()}`;
    }

    let sec = 753;
    setInterval(() => {
      sec += 1;
      const h = String(Math.floor(sec/3600)).padStart(2,'0');
      const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
      const s = String(sec%60).padStart(2,'0');
      uptime.textContent = `${h}:${m}:${s}`;
    }, 1000);

    function pingPOC() {
      log.textContent = `POC action triggered from phone at ${new Date().toLocaleTimeString()}`;
      navigator.vibrate?.(30);
    }
  </script>
</body>
</html>
